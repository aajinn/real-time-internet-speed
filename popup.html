<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Internet Speed Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            width: 260px;
            background: linear-gradient(135deg, #63656e 0%, #9d8ead 100%);
            color: #fff;
            overflow: hidden;
        }

        #main {
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 280px;
            background: linear-gradient(135deg, #63656e 0%, #9d8ead 100%);
            position: relative;
        }

        /* Top bar */
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 14px 8px;
            border-bottom: 1px solid rgba(255,255,255,0.12);
        }

        .app-title {
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
        }

        #pin-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: rgba(255,255,255,0.7);
            padding: 3px 8px;
            border-radius: 6px;
            font-size: 0.6rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        #pin-btn:hover {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* Speed hero */
        .speed-hero {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px 14px 10px;
            position: relative;
        }

        .speed-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .speed-divider {
            width: 1px;
            height: 44px;
            background: rgba(255,255,255,0.15);
            margin: 0 6px;
            align-self: center;
        }

        .speed-label {
            font-size: 0.6rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.5);
            margin-bottom: 2px;
        }

        #speed-container, #upload-container {
            display: flex;
            align-items: baseline;
            gap: 4px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        #speed {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
            color: #fff;
            letter-spacing: -2px;
        }

        #upload-speed {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1;
            color: rgba(255,255,255,0.75);
            letter-spacing: -2px;
        }

        #unit, #upload-unit {
            font-size: 0.8rem;
            color: rgba(255,255,255,0.4);
            font-weight: 400;
            margin-bottom: 4px;
        }

        /* Chart */
        #speedGraphContainer {
            width: 100%;
            padding: 4px 14px 0;
        }

        #speedChart {
            width: 100%;
            height: 80px;
            display: block;
            overflow: visible;
        }

        .chart-label {
            font-size: 0.55rem;
            fill: rgba(255,255,255,0.5);
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        /* Stats row: ping + jitter */
        .stats-row {
            display: flex;
            gap: 8px;
            padding: 10px 14px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .stat-card {
            flex: 1;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 8px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            backdrop-filter: blur(10px);
        }

        .stat-label {
            font-size: 0.55rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }

        .stat-value-row {
            display: flex;
            flex-direction: row;
            align-items: baseline;
            gap: 3px;
        }

        #ping {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
            line-height: 1;
        }

        #jitter {
            font-size: 1.3rem;
            font-weight: 700;
            color: #ffd700;
            line-height: 1;
        }

        .stat-unit {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
        }

        /* Bottom bar */
        .bottom-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 14px 10px;
            border-top: 1px solid rgba(255,255,255,0.12);
        }

        #status {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.6);
        }

        .status-testing { color: #ffd700 !important; }
        .status-error   { color: #ff6b6b !important; }
        .status-normal  { color: rgba(255,255,255,0.6); }

        #testButton {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 0.65rem;
            cursor: pointer;
            transition: all 0.2s;
            backdrop-filter: blur(10px);
        }
        #testButton:hover {
            background: rgba(255,255,255,0.2);
        }
        #testButton:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Error / loading states */
        .loading-text {
            color: #ffd700 !important;
            animation: blinkPop 1.2s infinite ease-in-out !important;
        }
        .error-text  { color: #ff6b6b !important; font-size: 2rem !important; letter-spacing: 0 !important; }
        .error-unit  { color: #ff6b6b !important; }
        .error-ping  { color: #ff6b6b !important; }

        @keyframes blinkPop {
            0%,100% { opacity: 1; transform: scale(1); }
            50%      { opacity: 0.5; transform: scale(1.04); }
        }

        /* Rating div */
        #ratingDiv {
            display: none;
            width: 100%;
            background: linear-gradient(135deg, #63656e 0%, #9d8ead 100%);
            padding: 24px 20px;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 10px;
        }

        #ratingDiv h3 {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
        }

        #ratingDiv p {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            line-height: 1.5;
        }

        #ratingDiv a {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 7px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s;
        }
        #ratingDiv a:hover { background: rgba(255,255,255,0.2); }

        #ratingDiv button {
            background: none;
            border: none;
            color: rgba(255,255,255,0.55);
            font-size: 11px;
            cursor: pointer;
            padding: 2px 6px;
            transition: color 0.2s;
        }
        #ratingDiv button:hover { color: rgba(255,255,255,0.9); }

        /* Footer */
        #footer {
            text-align: center;
            padding: 6px 14px 8px;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.5);
            border-top: 1px solid rgba(255,255,255,0.12);
        }
        #footer a {
            color: #ffd700;
            text-decoration: none;
            transition: color 0.2s;
        }
        #footer a:hover { color: #ffed4e; }
    </style>
</head>
<body>
    <div id="main">
        <div class="top-bar">
            <span class="app-title">Speed Monitor</span>
            <button id="pin-btn" title="Pin extension to toolbar">📌 Pin</button>
        </div>

        <div class="speed-hero">
            <div class="speed-block">
                <span class="speed-label">↓ Download</span>
                <div id="speed-container">
                    <span id="speed">--</span>
                    <span id="unit">Mbps</span>
                </div>
            </div>
            <div class="speed-divider"></div>
            <div class="speed-block">
                <span class="speed-label">↑ Upload</span>
                <div id="upload-container">
                    <span id="upload-speed">--</span>
                    <span id="upload-unit">Mbps</span>
                </div>
            </div>
        </div>

        <div id="speedGraphContainer">
            <svg id="speedChart" viewBox="0 0 232 80" preserveAspectRatio="none"></svg>
        </div>

        <div class="stats-row" id="ping-container">
            <div class="stat-card">
                <span class="stat-label">Ping</span>
                <div class="stat-value-row">
                    <span id="ping">--</span>
                    <span class="stat-unit" id="ping-unit">ms</span>
                </div>
            </div>
            <div class="stat-card">
                <span class="stat-label">Jitter</span>
                <div class="stat-value-row">
                    <span id="jitter">--</span>
                    <span class="stat-unit" id="jitter-unit">ms</span>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <span id="status" class="status-normal">Waiting...</span>
            <button id="testButton">Test Now</button>
        </div>

        <div id="footer">
            Made by <a target="_blank" href="https://ared.dev">Ared</a>
            &nbsp;·&nbsp;
            <a target="_blank" href="https://chromewebstore.google.com/detail/real-time-internet-speed/baffnjfijbgpjchgdmbnpkloeccnhenl/reviews">Rate ⭐</a>
            &nbsp;·&nbsp;
            <span>v2.7.0</span>
        </div>
    </div>

    <div id="ratingDiv">
        <h3>🌟 Enjoying the extension?</h3>
        <p>Help us improve by rating on the Chrome Web Store!</p>
        <a href="https://chromewebstore.google.com/detail/real-time-internet-speed/baffnjfijbgpjchgdmbnpkloeccnhenl/reviews"
            target="_blank" rel="noopener noreferrer">⭐ Rate Now</a>
        <div>
            <button id="dismiss-btn">Maybe Later</button>
            <button id="disable-rating-btn">Don't Show Again</button>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
