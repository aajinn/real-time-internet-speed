name: Build Chrome Extension

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  release:
    types: [ created ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install Puppeteer
      run: npm install puppeteer
      
    - name: Run HTML tests
      run: |
        node -e "
        const puppeteer = require('puppeteer');
        const path = require('path');
        
        (async () => {
          const browser = await puppeteer.launch();
          const page = await browser.newPage();
          
          page.on('console', msg => console.log('PAGE LOG:', msg.text()));
          
          await page.goto('file://' + path.resolve('./test.html'));
          await page.waitForTimeout(1000);
          
          const results = await page.evaluate(() => {
            const failedTests = document.querySelectorAll('.test.fail');
            return {
              total: document.querySelectorAll('.test').length,
              failed: failedTests.length,
              failures: Array.from(failedTests).map(el => el.textContent)
            };
          });
          
          console.log('Test Results:', results);
          
          if (results.failed > 0) {
            console.error('Tests failed:', results.failures);
            process.exit(1);
          }
          
          console.log('All tests passed!');
          await browser.close();
        })();
        "

  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
      
    - name: Create extension zip
      run: |
        # Create zip directly from root files
        zip -r chrome-extension-${{ github.sha }}.zip \
          manifest.json \
          background.js \
          popup.html \
          popup.js \
          icons/ \
          README.md
        
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: chrome-extension-${{ github.sha }}
        path: chrome-extension-${{ github.sha }}.zip
        retention-days: 30
        
    - name: Upload to release (if release event)
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: ./chrome-extension-${{ github.sha }}.zip
        asset_name: chrome-extension.zip
        asset_content_type: application/zip